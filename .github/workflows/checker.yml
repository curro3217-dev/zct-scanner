name: ZCT Checker

on:
  schedule:
    - cron: '0 8 * * *'     # una vez al dia a las 8:00 UTC
  workflow_dispatch:          # también se puede lanzar a mano desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write         # necesario para hacer push de alerts_log.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar resultados de alertas
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Guardar alerts_log.json actualizado en el repositorio
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add alerts_log.json
          git diff --cached --quiet && echo "Sin cambios en el log" && exit 0
          git commit -m "chore: checker actualiza resultados [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push fallo (intento $attempt), reintentando..."
            sleep 5
          done

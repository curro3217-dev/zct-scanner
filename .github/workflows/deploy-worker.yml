name: Deploy Bybit Proxy Worker

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy worker to Cloudflare
        run: |
          cat > worker.js << 'WORKEREOF'
          export default {
            async fetch(request) {
              const url = new URL(request.url);
              const bybitUrl = "https://api.bybit.com" + url.pathname + url.search;
              try {
                const resp = await fetch(bybitUrl, {
                  headers: { "User-Agent": "tfz-scanner/1.0" }
                });
                const body = await resp.text();
                return new Response(body, {
                  status: resp.status,
                  headers: {
                    "Content-Type": "application/json",
                    "Access-Control-Allow-Origin": "*"
                  }
                });
              } catch(e) {
                return new Response(JSON.stringify({error: String(e)}), {
                  status: 502,
                  headers: { "Content-Type": "application/json" }
                });
              }
            }
          };
          WORKEREOF
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/6c54770f3c48991d318f49027e0a3b03/workers/scripts/bybit-proxy" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/javascript" \
            --data-binary @worker.js | jq .success

name: ZCT Scanner

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # también se puede lanzar a mano desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # se mata antes de que llegue el siguiente ciclo

    steps:
      - uses: actions/checkout@v4
        with:
          # Token con permisos de escritura para poder hacer push del log
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scanner (ciclo único)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_ONCE: '1'
        run: python main.py

      - name: Guardar alerts_log.json en el repositorio
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add alerts_log.json || true
          # Solo hacer commit si hay cambios (es decir, si se generó alguna alerta)
          git diff --cached --quiet || git commit -m "chore: actualizar alerts_log [skip ci]"
          git push || true

name: ZCT Scanner

on:
  workflow_dispatch:          # lanzado por cron-job.org cada hora

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Test conectividad Binance Spot
        run: |
          curl -sS -m 10 "https://data-api.binance.vision/api/v3/ticker/24hr" | head -c 300
          echo

      - name: Loop de scans (cada minuto, 55 veces)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_ONCE: '1'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          for i in $(seq 1 55); do
            echo "=== Scan $i/55 ==="
            python main.py

            git add alerts_log.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: actualizar alerts_log [skip ci]"
              for attempt in 1 2 3; do
                git pull --rebase origin main && git push && break
                echo "Push fallo (intento $attempt), reintentando..."
                sleep 5
              done
            fi

            [ $i -lt 55 ] && sleep 60
          done

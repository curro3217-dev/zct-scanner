name: ZCT Scanner

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # tambien se puede lanzar a mano desde GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # se mata antes de que llegue el siguiente ciclo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scanner (ciclo unico)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_ONCE: '1'
        run: python main.py

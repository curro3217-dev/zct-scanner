name: ZCT Scanner

on:
  schedule:
    - cron: '0 * * * *'      # cada hora
  workflow_dispatch:          # también se puede lanzar a mano desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 58       # se mata antes de que llegue el siguiente ciclo
    permissions:
      contents: write         # necesario para hacer push de alerts_log.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scanner en bucle (55 min)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_ONCE: '1'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          END=$((SECONDS + 3300))
          while [ $SECONDS -lt $END ]; do
            INICIO=$SECONDS
            python main.py
            git add alerts_log.json
            if ! git diff --cached --quiet; then
              git pull --rebase origin main
              git commit -m "chore: actualizar alerts_log [skip ci]"
              git push
            fi
            ELAPSED=$((SECONDS - INICIO))
            REST=$((300 - ELAPSED))
            [ $REST -gt 0 ] && sleep $REST
          done

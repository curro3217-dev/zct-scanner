name: ZCT Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run backtest
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python zct_scanner/backtest.py

      - name: Analyze results
        if: always()
        run: |
          python - <<'EOF'
          import csv, collections, os
          path = 'zct_scanner/backtest_results.csv'
          if not os.path.exists(path):
              print("NO CSV"); exit()
          rows = list(csv.DictReader(open(path)))
          total = len(rows)
          print(f"TOTAL SETUPS: {total}")
          for strategy in ('BREAKOUT','MR'):
              sub = [r for r in rows if r['strategy']==strategy]
              if not sub: continue
              wins = sum(1 for r in sub if r['outcome']=='WIN')
              losses = sum(1 for r in sub if r['outcome']=='LOSS')
              wr = wins/len(sub)*100
              print(f"\n=== {strategy} === {len(sub)} setups | WR {wr:.1f}% ({wins}W/{losses}L)")
              for key in ('direction','ma_dir','level'):
                  counts = collections.Counter(r[key] for r in sub)
                  win_by = collections.Counter(r[key] for r in sub if r['outcome']=='WIN')
                  print(f"  by {key}:")
                  for val,n in sorted(counts.items()):
                      w = win_by.get(val,0)
                      print(f"    {val:15s} {w}/{n} = {w/n*100:.0f}%")
          print("\n=== FULL CSV ===")
          for r in rows:
              print(','.join(r.values()))
          EOF

      - name: Upload CSV de resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_number }}
          path: zct_scanner/backtest_results.csv
          retention-days: 30
